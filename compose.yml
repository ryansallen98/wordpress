services:
  bedrock:
    build:
      context: .
      target: runtime
      # Passed into the php_vendor stage so `composer install` can reach ACF Pro /
      # ACFE Pro. Docker Compose reads these from your project `.env` (same keys as
      # .env.example). Build args can appear in image metadata — use CI secrets for prod.
      args:
        ACF_PRO_LICENSE_KEY: ${ACF_PRO_LICENSE_KEY:-}
        WP_DOMAIN: ${WP_DOMAIN:-}
        WP_HOME: ${WP_HOME:-}
        ACFE_PRO_KEY: ${ACFE_PRO_KEY:-}
        ACFE_PRO_URL: ${ACFE_PRO_URL:-}
    environment:
      WP_ENV: ${WP_ENV:-development}
      WP_HOME: ${WP_HOME:-http://localhost:8080}
      WP_SITEURL: ${WP_SITEURL:-}
      # Default: bundled MariaDB on loopback. Override DB_HOST (e.g. `mysql`) or set
      # DATABASE_URL for an external DB; entrypoint skips embedded MariaDB when you do.
      DB_HOST: ${DB_HOST:-127.0.0.1}
      DB_NAME: ${DB_NAME:-}
      DB_USER: ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DATABASE_URL: ${DATABASE_URL:-}
      DB_PREFIX: ${DB_PREFIX:-wp_}
    ports:
      - '${APP_PORT:-8080}:80'
    restart: unless-stopped
    volumes:
      - bedrock-db:/var/lib/mysql
      - bedrock-runtime:/var/lib/bedrock
      - bedrock-uploads:/var/www/vhosts/localhost/bedrock/web/app/uploads

volumes:
  bedrock-db:
  bedrock-runtime:
  bedrock-uploads:
